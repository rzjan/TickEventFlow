version: '3.8'
services:
  mongo:
    image: mongo:8.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:8.0
    depends_on:
      - mongo
    volumes:
      - ./init-replica.sh:/docker/init-replica.sh:ro
    entrypoint: ["/docker/init-replica.sh"]

  ticketing.command:
    build:
      context: ..
      dockerfile: Projects/Ticketing.Command/Dockerfile
    depends_on:
      - mongo
    environment:
      - MongoDb=mongodb://mongo:27017/?replicaSet=rs0&retryWrites=true&retryReads=true
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:80"

volumes:
  mongo-data:
